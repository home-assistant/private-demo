name: Build

on:
  schedule:
    - cron: '45 9 * * 1-4'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - rootfs/**
  pull_request:
    branches:
      - main

jobs:
  init:
    name: Init image build
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'home-assistant' }}
    outputs:
      target: ${{ steps.target.outputs.version }}
      tag: ${{ steps.version.outputs.string }}
      new_image: ${{ github.event_name == 'pull_request' || steps.existing_image.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Target version
        id: target
        run: |
          echo "version=$(curl -sSL https://version.home-assistant.io/stable.json | jq -r '.homeassistant.default')" >> $GITHUB_OUTPUT

      - name: Set version string
        id: version
        run: |
          echo "string=${{ steps.target.outputs.version }}-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Check if image exist
        id: existing_image
        if: ${{ github.event_name != 'pull_request' }}
        continue-on-error: true
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/marketplace-demo:${{ steps.version.outputs.string }}

  build:
    name: Build image
    runs-on: ubuntu-latest
    needs:
      - "init"
    if: ${{ needs.init.outputs.new_image }}
    environment: ${{ github.event_name != 'pull_request' && 'build' || '' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            TARGET_VERSION=${{ needs.init.outputs.target }}
          tags: "ghcr.io/${{ github.repository_owner }}/marketplace-demo:${{ needs.init.outputs.tag }}"
